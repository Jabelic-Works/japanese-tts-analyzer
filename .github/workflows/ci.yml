name: CI

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --prefer-frozen-lockfile

      - name: Verify accent-ir
        run: |
          pnpm --filter @japanese-tts-analyzer/accent-ir build
          pnpm --filter @japanese-tts-analyzer/accent-ir test
          pnpm --filter @japanese-tts-analyzer/accent-ir type-check

      - name: Verify analyze-contract
        run: |
          pnpm --filter @japanese-tts-analyzer/analyze-contract build
          pnpm --filter @japanese-tts-analyzer/analyze-contract lint
          pnpm --filter @japanese-tts-analyzer/analyze-contract type-check

      - name: Verify tts-playground
        run: |
          pnpm --filter @japanese-tts-analyzer/tts-playground lint
          pnpm --filter @japanese-tts-analyzer/tts-playground type-check
          pnpm --filter @japanese-tts-analyzer/tts-playground build

      - name: Verify analyze-backend
        run: |
          pnpm --filter @japanese-tts-analyzer/analyze-backend test
          pnpm --filter @japanese-tts-analyzer/analyze-backend lint
          pnpm --filter @japanese-tts-analyzer/analyze-backend type-check
          pnpm --filter @japanese-tts-analyzer/analyze-backend build
